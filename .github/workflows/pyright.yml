name: pyright

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  pyright:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Run pyright
        run: uv run pyright
